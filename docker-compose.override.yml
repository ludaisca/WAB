services:
  app:
    build:
      target: dev
    ports:
      - "3001:5000"
    volumes:
      - .:/app
      - /app/node_modules
      - media_data:/app/media
      - backup_data:/app/backups
    env_file: .env
    environment:
      NODE_ENV: development
    command: >
      sh -c "npx prisma generate && npx prisma db push && npx prisma db execute --file prisma/sql/ensure-vector-index.sql --schema prisma/schema.prisma && mkdir -p /app/media /app/backups && npm run dev"

volumes:
  media_data:
  backup_data:
