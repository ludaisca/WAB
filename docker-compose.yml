services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${DB_PASSWORD:-postgres}"
      POSTGRES_DB: wab_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  db-init:
    image: pgvector/pgvector:pg16
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "PGPASSWORD=${DB_PASSWORD:-postgres} psql -h db -U postgres -d wab_db -c 'CREATE EXTENSION IF NOT EXISTS vector;'"
    restart: "no"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      target: runner
    expose:
      - "5000"
    environment:
      DATABASE_URL: "postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/wab_db"
      AUTH_SECRET: "${AUTH_SECRET}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: "${NODE_ENV:-production}"
      # Integración Google Sheets (opcional) — sin este passthrough las vars
      # definidas en Coolify solo servían para sustitución del compose, nunca
      # llegaban al proceso Node y la integración quedaba muerta en producción.
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_OAUTH_REDIRECT_URI: "${GOOGLE_OAUTH_REDIRECT_URI:-}"
      MEDIA_RETENTION_DAYS: "${MEDIA_RETENTION_DAYS:-90}"
      BACKUP_RETENTION_COUNT: "${BACKUP_RETENTION_COUNT:-7}"
      BACKUP_TIMEOUT_MS: "${BACKUP_TIMEOUT_MS:-1800000}"
      MAX_RESTORE_UPLOAD_BYTES: "${MAX_RESTORE_UPLOAD_BYTES:-5368709120}"
    healthcheck:
      # 127.0.0.1, no "localhost": dentro del contenedor localhost resuelve a
      # ::1 primero y next-server solo escucha en IPv4 — con localhost el
      # healthcheck falla siempre con "Connection refused" aunque la app esté bien.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - backup_data:/app/backups
    restart: unless-stopped

volumes:
  pgdata:
  media_data:
  backup_data:
